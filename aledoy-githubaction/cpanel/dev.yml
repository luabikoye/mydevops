name: Deploy PHP App to Shared Hosting

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2
        with:
          fetch-depth: 2

      - name: Determine changed files
        id: changed-files
        run: |
          git diff --name-only HEAD~1 > changed_files.txt

      - name: Display changed files
        run: |
          cat changed_files.txt

      - name: Install MySQL Client
        run: sudo apt-get install -y mysql-client

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      #- name: Deploy entire PHP app to Shared Hosting
      #  run: |
      #    lftp -e "set ftp:ssl-allow no; open -u ${{ secrets.CPANEL_DEV_USERNAME }},${{ secrets.CPANEL_DEV_PASSWORD }} ${{ secrets.CPANEL_DEV_HOST }}; mirror -R . /public_html/lsgglobalhealth; exit"

      - name: Deploy changed files to Shared Hosting
        run: |
          changed_files=$(cat changed_files.txt)
          for file in $changed_files; do
            if [[ -f "$file" ]]; then
              dir=$(dirname "$file")
              lftp -c "set ftp:ssl-allow no; open -u ${{ secrets.CPANEL_DEV_USERNAME }},${{ secrets.CPANEL_DEV_PASSWORD }} ${{ secrets.CPANEL_DEV_HOST }}; mirror -R --ignore-time --only-newer $dir /public_html/lsgglobalhealth/$dir; bye"
            fi
          done